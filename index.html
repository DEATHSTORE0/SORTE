<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Store | Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; }

        header {
            width: 100%; padding: 15px 40px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid #ff0000; background: #000;
        }
        .logo { font-weight: 900; font-size: 20px; }
        .logo span { color: #ff0000; }
        .saldo { color: #ffcc00; font-weight: bold; }

        main { flex: 1; display: flex; justify-content: center; align-items: center; }

        /* PAINEL DE LOGIN IDÊNTICO À FOTO */
        .login-card {
            width: 350px; background: #0a0a0a; padding: 40px 30px; border-radius: 15px;
            border: 2px solid #ff0000; box-shadow: 0 0 35px rgba(255, 0, 0, 0.5); text-align: center;
        }
        h2 { color: #ff0000; margin-bottom: 25px; text-transform: uppercase; font-size: 20px; }
        
        input {
            width: 100%; padding: 12px; background: transparent; border: 1px solid #fff;
            border-radius: 5px; color: #fff; text-align: center; margin-bottom: 20px; outline: none;
        }

        .btn {
            width: 100%; padding: 15px; background: #ff0000; border: none; border-radius: 5px;
            color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* ROLETA (ESCONDIDA) */
        #game-area { display: none; flex-direction: column; align-items: center; }
        .roulette {
            width: 300px; height: 100px; border: 2px solid #333; position: relative;
            overflow: hidden; background: #050505; margin: 20px;
        }
        .pointer {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            border-left: 20px solid #ff0000; border-top: 15px solid transparent; border-bottom: 15px solid transparent; z-index: 10;
        }
        .strip { display: flex; flex-direction: column; transition: transform 9s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; color: #444; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>DEATH</span> STORE</div>
        <div class="saldo">SALDO: <span id="saldo-txt">0</span></div>
    </header>

    <main>
        <section id="login-area">
            <div class="login-card">
                <h2>LOGIN KEY</h2>
                <input type="text" id="key-input" placeholder="COLE SUA KEY">
                <button class="btn" onclick="verificarKey()">ATIVAR 1.0M</button>
                <p id="msg" style="margin-top: 15px; font-size: 12px;"></p>
            </div>
        </section>

        <section id="game-area">
            <h2 style="margin-bottom: 5px;">ROLETA DEATH</h2>
            <div class="roulette">
                <div class="pointer"></div>
                <div id="strip" class="strip"></div>
            </div>
            <button class="btn" style="width: 200px;" onclick="jogar()">GIRAR (CUSTO: 5)</button>
        </section>
    </main>

    <script>
        // LISTA DE 5 KEYS ÚNICAS (Você pode mudar os nomes aqui)
        let keysDisponiveis = ["MORTE-1", "MORTE-2", "MORTE-3", "MORTE-4", "MORTE-5"];
        let saldo = 0;

        function verificarKey() {
            const input = document.getElementById('key-input').value.trim();
            const msg = document.getElementById('msg');

            // Verifica se a key está na lista
            const index = keysDisponiveis.indexOf(input);

            if (index !== -1) {
                // Remove a key da lista para não ser usada novamente
                keysDisponiveis.splice(index, 1);
                
                // Concede saldo e muda de tela
                saldo = 10; 
                document.getElementById('saldo-txt').textContent = saldo;
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('game-area').style.display = 'flex';
                prepararRoleta();
            } else {
                msg.textContent = "KEY INVÁLIDA OU JÁ UTILIZADA!";
                msg.style.color = "red";
            }
        }

        function prepararRoleta() {
            const strip = document.getElementById('strip');
            strip.innerHTML = '';
            for(let i=0; i<400; i++) {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = i % 5 === 0 ? "KEY 50" : "NADA";
                if(div.textContent !== "NADA") div.style.color = "#ffcc00";
                strip.appendChild(div);
            }
        }

        function jogar() {
            if(saldo < 5) return;
            saldo -= 5;
            document.getElementById('saldo-txt').textContent = saldo;

            const strip = document.getElementById('strip');
            strip.style.transition = 'none';
            strip.style.transform = 'translateY(0)';
            void strip.offsetHeight;

            strip.style.transition = 'transform 9s cubic-bezier(0.1, 0, 0.1, 1)';
            // Para sempre no NADA
            strip.style.transform = 'translateY(-29500px)'; 

            setTimeout(() => {
                alert("RESULTADO: NADA");
                if(saldo < 5) {
                    location.reload(); // Reseta para o login quando acaba o saldo
                }
            }, 9500);
        }
    </script>
</body>
</html>
